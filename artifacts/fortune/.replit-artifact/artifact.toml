kind = "web"
previewPath = "/"
title = "Fortune App"
version = "1.0.0"
id = "artifacts/fortune"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23791

[services.development]
run = "pnpm --filter @workspace/fortune run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/fortune", "run", "build" ]
publicDir = "artifacts/fortune/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23791"
BASE_PATH = "/"

kind = "web"
previewPath = "/crossword/"
title = "Daily Crossword"
version = "1.0.0"
id = "artifacts/crossword"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/crossword/" ]
localPort = 19480

[services.development]
run = "pnpm --filter @workspace/crossword run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/crossword", "run", "build" ]
publicDir = "artifacts/crossword/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19480"
BASE_PATH = "/crossword/"
